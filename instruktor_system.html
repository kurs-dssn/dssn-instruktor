<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSSN Instruktørportal</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 50px auto; }
        .header { text-align: center; margin-bottom: 40px; }
        h1 { color: #FFD700; margin-bottom: 10px; }
        .badge { 
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #FFD700;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .login-box {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.2);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #3a3a3a;
            border: 2px solid transparent;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
        }
        input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #FFD700;
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: #ffd000; }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .alert-info { background: rgba(255, 215, 0, 0.2); border: 2px solid #FFD700; }
        .alert-success { background: rgba(76, 175, 80, 0.2); border: 2px solid #4CAF50; color: #4CAF50; }
        .alert-error { background: rgba(244, 67, 54, 0.2); border: 2px solid #f44336; color: #f44336; }
        .hidden { display: none; }
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        .user-info {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stat { 
            background: #3a3a3a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 10px 0;
        }
        .stat-value { color: #FFD700; font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 DSSN Instruktørportal</h1>
            <p>Dynamisk Sportsskyting Norge</p>
            <span class="badge">🔥 Firebase Cloud Edition</span>
        </div>

        <!-- Login -->
        <div id="loginScreen">
            <div class="login-box">
                <h2 style="color: #FFD700; margin-bottom: 20px;">Logg inn</h2>
                <div id="loginAlert" class="alert alert-info hidden"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>E-post:</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Passord:</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn">Logg inn</button>
                </form>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="mailto:kurs@dssn.no?subject=Glemt%20passord%20-%20DSSN%20Instruktørportal&body=Hei%2C%0A%0AJeg%20har%20glemt%20passordet%20mitt%20til%20DSSN%20Instruktørportal.%0A%0AMitt%20brukernavn%20(e-post)%3A%20%0A%0AMvh" style="color: #FFD700; text-decoration: none; font-size: 0.9em;">
                        Glemt passord? Kontakt kurs@dssn.no
                    </a>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <div class="user-info">
                <h2 id="userName" style="color: #FFD700;"></h2>
                <p id="userEmail"></p>
                <button onclick="logout()" class="btn" style="margin-top: 15px;">Logg ut</button>
            </div>
            <div class="stat">
                <div>Totalt poeng</div>
                <div class="stat-value" id="totalPoints">0</div>
            </div>
        </div>
    </div>

    <script>
        // Firebase init
        const firebaseConfig = {
            apiKey: "AIzaSyAvDeuKD5CwxTrYRMyWlhN5zPNyMZFPdCA",
            authDomain: "dssn-instruktor.firebaseapp.com",
            projectId: "dssn-instruktor",
            storageBucket: "dssn-instruktor.firebasestorage.app",
            messagingSenderId: "215885205974",
            appId: "1:215885205974:web:c736b46ec8e6c67d7a1477"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let instructors = [];
        let currentUser = null;

        // Load instructors from Google Sheets
        async function loadInstructors() {
            try {
                console.log('⏳ Laster instruktørdata fra Google Sheets...');
                const response = await fetch('https://docs.google.com/spreadsheets/d/1QVMDnoy68nn-e-4NEd_59wqbFfkP4Nvx/export?format=xlsx');
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                
                let headerIdx = rows.findIndex(r => r[0] === '#' && r[1] === 'E-postadresse');
                if (headerIdx === -1) throw new Error('Header not found');
                
                instructors = rows.slice(headerIdx + 1)
                    .filter(r => r[1] && r[2])
                    .map(r => ({
                        id: 'INSTR' + String(r[0]).padStart(3, '0'),
                        email: r[1],
                        name: r[2] + ' ' + r[3],
                        club: r[4]
                    }));
                
                console.log('✅ Loaded', instructors.length, 'instructors from Google Sheets');
            } catch (err) {
                console.error('❌ Load error:', err);
                alert('❌ Kunne ikke laste instruktørdata. Prøv å oppdatere siden.');
            }
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('loginAlert');
            if (alert) {
                alert.textContent = msg;
                alert.className = 'alert alert-' + type;
                alert.classList.remove('hidden');
            }
            // Also show browser alert for errors to ensure visibility
            if (type === 'error') {
                window.alert(msg);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            
            // Check if data is loaded
            if (!instructors || instructors.length === 0) {
                showAlert('⏳ Data lastes fortsatt. Vent noen sekunder og prøv igjen.', 'error');
                return;
            }
            
            const user = instructors.find(i => i.email.toLowerCase() === email);
            if (!user) {
                showAlert('❌ E-postadressen finnes ikke i systemet. Kontakt kurs@dssn.no hvis dette er feil.', 'error');
                return;
            }
            
            try {
                const doc = await db.collection('passwords').doc(email).get();
                if (doc.exists) {
                    const hash = CryptoJS.SHA256(password).toString();
                    if (hash !== doc.data().password) {
                        showAlert('❌ Feil passord. Prøv igjen eller bruk "Glemt passord"-lenken.', 'error');
                        return;
                    }
                } else {
                    // First time - save password
                    const hash = CryptoJS.SHA256(password).toString();
                    await db.collection('passwords').doc(email).set({
                        password: hash,
                        created: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
            } catch (err) {
                showAlert('❌ Feil ved innlogging. Sjekk internettforbindelsen og prøv igjen.', 'error');
                console.error(err);
            }
        });

        function logout() {
            currentUser = null;
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginForm').reset();
        }

        // Load on startup
        window.addEventListener('DOMContentLoaded', loadInstructors);
    </script>
</body>
</html>
