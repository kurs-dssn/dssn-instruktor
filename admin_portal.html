<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSSN Admin - Passordgenerering</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dssn-yellow: #FFD700;
            --dssn-black: #1a1a1a;
            --dssn-gray: #2a2a2a;
            --dssn-light-gray: #3a3a3a;
            --text-white: #ffffff;
            --text-gray: #cccccc;
            --success: #4CAF50;
            --warning: #ff9800;
            --error: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dssn-black) 0%, var(--dssn-gray) 100%);
            color: var(--text-white);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--dssn-gray);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1);
        }

        .header h1 {
            color: var(--dssn-yellow);
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .admin-section {
            background: var(--dssn-gray);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1);
        }

        .admin-section h2 {
            color: var(--dssn-yellow);
            margin-bottom: 20px;
        }

        .file-upload input[type="file"] {
            width: 100%;
            padding: 12px;
            background: var(--dssn-light-gray);
            border: 2px solid var(--dssn-yellow);
            border-radius: 8px;
            color: var(--text-white);
            cursor: pointer;
            font-size: 1em;
        }

        .btn {
            padding: 14px 28px;
            background: var(--dssn-yellow);
            color: var(--dssn-black);
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: #ffd000;
        }

        .btn-secondary {
            background: var(--dssn-light-gray);
            color: var(--text-white);
            border: 2px solid var(--dssn-yellow);
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
            margin: 0 5px 0 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--dssn-light-gray);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--dssn-yellow);
        }

        .stat-card h3 {
            color: var(--text-gray);
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            color: var(--dssn-yellow);
            font-size: 2em;
            font-weight: 700;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid var(--success);
            color: var(--success);
        }

        .alert-info {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid var(--dssn-yellow);
            color: var(--dssn-yellow);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid var(--error);
            color: var(--error);
        }

        .instructor-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: var(--dssn-light-gray);
            border-radius: 10px;
            overflow: hidden;
        }

        .instructor-table th {
            background: var(--dssn-black);
            color: var(--dssn-yellow);
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .instructor-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--dssn-gray);
            color: var(--text-white);
        }

        .instructor-table tr:hover {
            background: var(--dssn-gray);
        }

        .password-badge {
            background: var(--success);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .no-password {
            background: var(--error);
        }

        .hidden {
            display: none;
        }

        select {
            padding: 12px;
            background: var(--dssn-light-gray);
            border: 2px solid var(--dssn-yellow);
            border-radius: 8px;
            color: var(--text-white);
            font-size: 1em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 DSSN Admin Portal</h1>
            <p>Passordgenerering for Instruktørportalen</p>
        </div>

        <!-- Step 1: Upload -->
        <div class="admin-section">
            <h2>📁 Steg 1: Last opp instruktørdatabase</h2>
            <input type="file" id="excelFile" accept=".xlsx,.xls">
            <div id="uploadStatus"></div>
        </div>

        <!-- Step 2: Password Generation -->
        <div id="step2" class="admin-section hidden">
            <h2>🔑 Steg 2: Generer passord</h2>
            
            <div class="stats">
                <div class="stat-card">
                    <h3>Totalt instruktører</h3>
                    <div class="value" id="totalCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Med passord</h3>
                    <div class="value" id="withPass">0</div>
                </div>
                <div class="stat-card">
                    <h3>Uten passord</h3>
                    <div class="value" id="withoutPass">0</div>
                </div>
            </div>

            <label>Passordlengde:</label>
            <select id="passLength">
                <option value="8">8 tegn (standard)</option>
                <option value="10">10 tegn</option>
                <option value="12">12 tegn</option>
            </select>

            <div>
                <button class="btn" onclick="genAll()">Generer passord til ALLE</button>
                <button class="btn btn-secondary" onclick="genNew()">Kun de uten passord</button>
                <button class="btn btn-danger" onclick="clearAll()">Nullstill alle</button>
            </div>

            <div id="genStatus"></div>
        </div>

        <!-- Step 3: Table -->
        <div id="step3" class="admin-section hidden">
            <h2>📋 Steg 3: Instruktøroversikt</h2>
            
            <button class="btn" onclick="exportExcel()">📥 Eksporter passordliste</button>
            <button class="btn btn-secondary" onclick="copyEmail()">📧 Kopier e-postmal</button>

            <table class="instructor-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Navn</th>
                        <th>E-post</th>
                        <th>Klubb</th>
                        <th>Passord</th>
                        <th>Handling</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let instructors = [];
        let passwords = {};

        // Load saved passwords
        const saved = localStorage.getItem('dssnAdminPasswords');
        if (saved) {
            try {
                passwords = JSON.parse(saved);
                console.log('Loaded passwords from storage:', Object.keys(passwords).length);
            } catch (e) {
                console.error('Error loading passwords:', e);
            }
        }

        // File upload handler
        document.getElementById('excelFile').addEventListener('change', function(e) {
            console.log('File input changed');
            
            const file = e.target.files[0];
            if (!file) {
                console.log('No file selected');
                return;
            }

            console.log('File selected:', file.name);
            showStatus('uploadStatus', '⏳ Leser fil...', 'info');

            const reader = new FileReader();
            
            reader.onerror = function(error) {
                console.error('FileReader error:', error);
                showStatus('uploadStatus', '❌ Feil ved lesing av fil', 'error');
            };
            
            reader.onload = function(e) {
                console.log('File loaded, size:', e.target.result.byteLength);
                
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    
                    console.log('Workbook sheets:', workbook.SheetNames);
                    
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                    
                    console.log('Total rows:', rows.length);
                    
                    // Find header
                    let headerIdx = -1;
                    for (let i = 0; i < rows.length; i++) {
                        if (rows[i][0] === '#' && rows[i][1] === 'E-postadresse') {
                            headerIdx = i;
                            break;
                        }
                    }
                    
                    if (headerIdx === -1) {
                        console.error('Header not found. First rows:', rows.slice(0, 5));
                        showStatus('uploadStatus', '❌ Finner ikke header-rad. Sjekk filformat.', 'error');
                        return;
                    }
                    
                    console.log('Header found at row:', headerIdx);
                    
                    // Parse instructors
                    instructors = [];
                    for (let i = headerIdx + 1; i < rows.length; i++) {
                        const r = rows[i];
                        if (!r[1] || !r[2]) continue;
                        
                        instructors.push({
                            num: r[0],
                            email: r[1],
                            first: r[2],
                            last: r[3],
                            name: `${r[2]} ${r[3]}`,
                            club: r[4],
                            region: getRegion(r)
                        });
                    }
                    
                    console.log('Parsed instructors:', instructors.length);
                    
                    showStatus('uploadStatus', `✅ Lastet ${instructors.length} instruktører!`, 'success');
                    
                    // Show next steps
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                    
                    updateUI();
                    
                } catch (error) {
                    console.error('Parse error:', error);
                    showStatus('uploadStatus', '❌ Feil: ' + error.message, 'error');
                }
            };
            
            reader.readAsArrayBuffer(file);
        });

        function getRegion(row) {
            if (row[5] === 1) return 'Nord';
            if (row[6] === 1) return 'Midt';
            if (row[7] === 1) return 'Vest';
            if (row[8] === 1) return 'Sør';
            if (row[9] === 1) return 'Øst';
            return 'Ukjent';
        }

        function showStatus(id, msg, type) {
            const el = document.getElementById(id);
            el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        }

        function genPassword(len) {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let pass = '';
            for (let i = 0; i < len; i++) {
                pass += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return pass;
        }

        function genAll() {
            const len = parseInt(document.getElementById('passLength').value);
            let count = 0;
            
            instructors.forEach(inst => {
                const email = inst.email.toLowerCase();
                const plain = genPassword(len);
                const hashed = CryptoJS.SHA256(plain).toString();
                
                passwords[email] = {
                    plain: plain,
                    hashed: hashed,
                    date: new Date().toISOString()
                };
                count++;
            });
            
            savePasswords();
            showStatus('genStatus', `✅ Generert ${count} passord!`, 'success');
            updateUI();
        }

        function genNew() {
            const len = parseInt(document.getElementById('passLength').value);
            let count = 0;
            
            instructors.forEach(inst => {
                const email = inst.email.toLowerCase();
                if (!passwords[email]) {
                    const plain = genPassword(len);
                    const hashed = CryptoJS.SHA256(plain).toString();
                    
                    passwords[email] = {
                        plain: plain,
                        hashed: hashed,
                        date: new Date().toISOString()
                    };
                    count++;
                }
            });
            
            savePasswords();
            showStatus('genStatus', `✅ Generert ${count} nye passord!`, 'success');
            updateUI();
        }

        function genSingle(email) {
            const len = parseInt(document.getElementById('passLength').value);
            const inst = instructors.find(i => i.email.toLowerCase() === email);
            
            const plain = genPassword(len);
            const hashed = CryptoJS.SHA256(plain).toString();
            
            passwords[email] = {
                plain: plain,
                hashed: hashed,
                date: new Date().toISOString()
            };
            
            savePasswords();
            
            // Show dialog with options
            const copyText = `Passord: ${plain}`;
            
            if (confirm(`✅ Passord generert for ${inst.name}:\n\n${plain}\n\nKlikk OK for å åpne e-postutkast, eller Avbryt for å kopiere passordet.`)) {
                openEmailDraft(inst, plain);
            } else {
                navigator.clipboard.writeText(copyText).then(() => {
                    alert('📋 Passord kopiert til utklippstavle!');
                });
            }
            
            updateUI();
        }
        
        function openEmailDraft(inst, password) {
            const subject = encodeURIComponent('Tilgang til DSSN Instruktørportal');
            const body = encodeURIComponent(`Hei ${inst.first},

Velkommen til DSSN Instruktørportal!

Du har nå fått tilgang til vår portal for registrering av instruktøraktivitet.

INNLOGGINGSINFORMASJON:
E-post: ${inst.email}
Midlertidig passord: ${password}

VIKTIG - Første gangs innlogging:
1. Gå til instruktørportalen (link kommer i separat e-post)
2. Last opp "instr.xlsx" (får du tilsendt separat hvis du ikke har den)
3. Logg inn med e-posten din og passordet ovenfor
4. Du vil bli bedt om å opprette et nytt, personlig passord
5. Velg et passord du husker (minst 6 tegn)

Spørsmål?
Kontakt kurs@dssn.no

Med vennlig hilsen,
DSSN Pistollandslaget
kurs@dssn.no`);
            
            // Create mailto link
            const mailtoLink = `mailto:${inst.email}?subject=${subject}&body=${body}`;
            
            // Open in default email client
            window.location.href = mailtoLink;
        }

        function deleteSingle(email) {
            const inst = instructors.find(i => i.email.toLowerCase() === email);
            if (confirm(`Slette passord for ${inst.name}?`)) {
                delete passwords[email];
                savePasswords();
                updateUI();
            }
        }

        function clearAll() {
            if (confirm('Nullstill ALLE passord? Dette kan ikke angres.')) {
                passwords = {};
                savePasswords();
                showStatus('genStatus', '✅ Alle passord nullstilt', 'success');
                updateUI();
            }
        }

        function savePasswords() {
            localStorage.setItem('dssnAdminPasswords', JSON.stringify(passwords));
            console.log('Passwords saved:', Object.keys(passwords).length);
        }

        function updateUI() {
            // Update stats
            document.getElementById('totalCount').textContent = instructors.length;
            const withP = instructors.filter(i => passwords[i.email.toLowerCase()]).length;
            document.getElementById('withPass').textContent = withP;
            document.getElementById('withoutPass').textContent = instructors.length - withP;
            
            // Update table
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            instructors.forEach((inst, idx) => {
                const email = inst.email.toLowerCase();
                const pass = passwords[email];
                
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${idx + 1}</td>
                    <td>${inst.name}</td>
                    <td>${inst.email}</td>
                    <td>${inst.club}</td>
                    <td>
                        ${pass ? 
                            `<span class="password-badge">${pass.plain}</span>` : 
                            `<span class="password-badge no-password">Ikke generert</span>`
                        }
                    </td>
                    <td>
                        <button class="btn btn-small" onclick="genSingle('${email}')">
                            ${pass ? '🔄 Ny' : '🔑 Generer'}
                        </button>
                        ${pass ? `<button class="btn btn-small btn-danger" onclick="deleteSingle('${email}')">🗑️</button>` : ''}
                    </td>
                `;
            });
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();
            
            const data = [['#', 'Navn', 'E-post', 'Klubb', 'Passord', 'Generert']];
            
            instructors.forEach((inst, idx) => {
                const email = inst.email.toLowerCase();
                const pass = passwords[email];
                
                data.push([
                    idx + 1,
                    inst.name,
                    inst.email,
                    inst.club,
                    pass ? pass.plain : 'Ikke generert',
                    pass ? new Date(pass.date).toLocaleString('no-NO') : ''
                ]);
            });
            
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Passord');
            
            const date = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `DSSN_Passord_${date}.xlsx`);
        }

        function copyEmail() {
            const text = `Emne: Tilgang til DSSN Instruktørportal

Hei,

Velkommen til DSSN Instruktørportal!

Her kan du registrere kurs og treninger, se din aktivitetshistorikk, og følge med på dine poeng.

INNLOGGING:
E-post: [DIN E-POST]
Passord: [SE VEDLAGT LISTE]

Første gang du logger inn må du opprette et nytt personlig passord.

Spørsmål? Kontakt kurs@dssn.no

Med vennlig hilsen,
DSSN Pistollandslaget`;

            navigator.clipboard.writeText(text).then(() => {
                alert('✅ E-postmal kopiert!');
            });
        }
    </script>
</body>
</html>
